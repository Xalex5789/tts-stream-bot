<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TTS Overlay Simple</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: Arial, sans-serif;
        }
        
        #message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            display: none;
            border: 2px solid #00ff00;
        }
    </style>
</head>
<body>
    <div id="message"></div>

    <script>
        const API_URL = 'https://tts-stream-bot-production.up.railway.app';
        let isPlaying = false;
        const messageEl = document.getElementById('message');

        // Función para reproducir TTS
        async function playTTS(voice, text) {
            if (isPlaying) return;
            
            try {
                isPlaying = true;
                
                // Mostrar mensaje
                messageEl.textContent = text;
                messageEl.style.display = 'block';
                
                // Generar y reproducir audio
                const audioUrl = `${API_URL}/tts?voice=${encodeURIComponent(voice)}&text=${encodeURIComponent(text)}`;
                const audio = new Audio(audioUrl);
                
                audio.onended = () => {
                    isPlaying = false;
                    messageEl.style.display = 'none';
                };
                
                audio.onerror = () => {
                    isPlaying = false;
                    messageEl.style.display = 'none';
                    console.error('Error reproduciendo audio');
                };
                
                await audio.play();
                
            } catch (error) {
                console.error('Error:', error);
                isPlaying = false;
                messageEl.style.display = 'none';
            }
        }

        // Escuchar comandos desde URL
        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const voice = params.get('voice');
            const text = params.get('text');
            
            if (voice && text && !isPlaying) {
                playTTS(voice, text);
                // Limpiar URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // API para testing manual
        window.playTTS = playTTS;
        
        window.testTTS = function() {
            playTTS('voz1', 'Esta es una prueba del sistema TTS');
        };

        // Verificar URL cada 2 segundos
        setInterval(checkUrlParams, 2000);
        checkUrlParams();

        console.log('✅ TTS Overlay cargado');
        console.log('💡 Para probar: testTTS() o playTTS("voz1", "tu mensaje")');
    </script>
</body>
</html>
